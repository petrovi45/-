<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Кинососветчик с ИИ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
     <h1>Ai советчик фильмов</h1>
      <p>Введи фразу о своем настроении. ИИ подберет фильм</p>
     <form method="post">
         <textarea name="message" id="message" cols="50" rows="4" required
                   placeholder="Например: у меня сегодня хорошее настроение!">
             {{ user_text }}
         </textarea>
         <button type="submit">Отправить</button>
     </form>
     { % if recomendation % }
     <div class="result">
         <h3>Рекомендация</h3>
         <p>{{ recommendation|safe }}</p>
     </div>
     { % endif % }
</body>
</html>
